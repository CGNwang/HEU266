账号安全

<div class="space-y-4">
<!-- Change Password -->
<button class="w-full flex items-center p-4 bg-surface-container-low hover:bg-surface-container-lowest transition-all duration-300 rounded-2xl group text-left">
<div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-primary shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">lock</span>
</div>
<div class="ml-4 flex-1">
<div class="text-on-surface font-bold">修改密码</div>
<div class="text-on-surface-variant text-sm">定期更换密码保护账号</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>

<!-- Change Email -->
<button class="w-full flex items-center p-4 bg-surface-container-low hover:bg-surface-container-lowest transition-all duration-300 rounded-2xl group text-left">
<div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-primary shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">mail</span>
</div>
<div class="ml-4 flex-1">
<div class="text-on-surface font-bold">更换邮箱</div>
<div class="text-on-surface-variant text-sm">更改绑定邮箱地址</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>

<div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-primary shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">smartphone</span>
</div>
<div class="ml-4 flex-1">
<div class="text-on-surface font-bold">绑定手机</div>
<div class="text-on-surface-variant text-sm">用于找回密码与通知</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
