<a href="index.html" class="flex items-center gap-1">

<!-- Auth Canvas -->
<main class="w-full max-w-lg flex-1 flex flex-col justify-center">
<!-- Central Floating Card -->
<div class="glass-card ghost-border rounded-[2rem] p-10 md:p-12 shadow-[0_8px_32px_rgba(28,28,24,0.06)] flex flex-col items-center text-center">
<!-- Icon/Shield Visual -->
<div class="w-20 h-20 sunset-gradient rounded-full flex items-center justify-center mb-8 shadow-lg shadow-orange-500/20">
<span class="material-symbols-outlined text-white text-4xl" data-icon="verified_user">verified_user</span>
</div>
<!-- Title & Subtitle -->
<h1 class="text-3xl font-bold font-headline text-on-surface tracking-tight mb-4">校园身份认证</h1>
<p class="text-on-surface-variant leading-relaxed mb-10 max-w-xs">为了保持社交环境的纯粹，请使用 HEU 校园邮箱认证</p>
<!-- Form -->
<form class="w-full space-y-6">
<div class="space-y-2 text-left">
<label class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant ml-4" for="email">HEU 校园邮箱</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-6 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:bg-surface-container-lowest transition-all duration-300 ghost-border" id="email" placeholder="name@hrbeu.edu.cn" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-outline/30" data-icon="alternate_email">alternate_email</span>
</div>
</div>
</div>
<!-- Verification Code Action -->
<button onclick="window.location.href='Register.html'" class="w-full sunset-gradient text-white font-bold py-5 rounded-full shadow-lg shadow-orange-700/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="button">
<span>发送验证码</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Privacy Policy & Trust Tags -->
<div class="mt-10 pt-8 border-t border-orange-100/30 w-full">
<div class="flex flex-wrap justify-center gap-4 mb-6">
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-secondary-fixed rounded-full text-on-secondary-fixed-variant text-xs font-semibold">
<span class="material-symbols-outlined text-[14px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
                            隐私加密保护
                        </div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-surface-container-high rounded-full text-on-surface-variant text-xs font-semibold">
<span class="material-symbols-outlined text-[14px]" data-icon="visibility_off" style="font-variation-settings: 'FILL' 1;">visibility_off</span>
                            完全匿名策略
                        </div>
</div>
<p class="text-[12px] text-on-surface-variant/60 leading-relaxed px-4">
                        您的个人信息仅用于验证哈工程学生身份，系统将对您的真实姓名进行混淆脱敏。认证完成后，您将正式解锁「🍊意配」所有心动功能。
                    </p>
</div>
</div>

<div class="mt-12 text-center">
<button class="text-on-surface-variant hover:text-primary font-medium text-sm transition-colors flex items-center justify-center gap-1 mx-auto">
